<!--
  THE HUMAN AI CO — GLOBAL STYLES
  ------------------------------------------------------------------------------
  Paste this whole block into Webflow: Site Settings → Custom Code → Head Code
  (applies to every page). It sets up the font, dark base theme, and every
  shared component class (cards, stats, steps, buttons, grids) used across
  Home, Foundation, Aurora, Clarity, Navigation and Contact.

  Each page sets its own accent color by adding style="--accent:#RRGGBB" on the
  outermost wrapper div of that page's pasted content — see the per-page files.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"
  rel="stylesheet"
/>
<!--
  model-viewer powers every interactive 3D hero (Home + 4 service pages).
  Loaded once here, site-wide, so each page's embed can just drop in a
  <model-viewer> tag without re-importing the script.
-->
<script type="module" src="https://unpkg.com/@google/model-viewer@4.3.1/dist/model-viewer.min.js"></script>
<style>
  model-viewer.hai-3d {
    width: 100%;
    height: 100%;
    --poster-color: transparent;
    background: transparent;
  }
  :root {
    --accent: #ff6a3d;
    --bg: #0a0a0a;
    --card-bg: #141417;
    --card-border: rgba(255,255,255,0.08);
    --text: #f5f5f2;
    --text-dim: rgba(245,245,242,0.72);
    --text-dimmer: rgba(245,245,242,0.5);
  }
  .hai-page, .hai-page * { box-sizing: border-box; }
  .hai-page {
    background: var(--bg);
    color: var(--text);
    font-family: "Manrope", ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .hai-container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
  .hai-section { padding: 88px 0; }
  .hai-section--tight { padding: 56px 0; }

  .hai-eyebrow {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .hai-h1 {
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    font-size: clamp(48px, 9vw, 120px);
    line-height: 0.95;
    margin: 0 0 20px;
  }
  .hai-h2 {
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    font-size: clamp(28px, 4vw, 42px);
    line-height: 1.05;
    margin: 0 0 24px;
  }
  .hai-h3 {
    font-weight: 700;
    font-size: 20px;
    margin: 0 0 10px;
  }
  .hai-lead {
    font-size: 17px;
    line-height: 1.65;
    color: var(--text-dim);
    margin: 0 0 16px;
  }
  .hai-tagline {
    font-size: 13px;
    letter-spacing: 0.05em;
    color: var(--text-dimmer);
  }

  .hai-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: 999px;
    padding: 14px 26px;
    font-family: "Manrope", sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: filter 0.2s ease, transform 0.2s ease;
  }
  .hai-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .hai-btn--outline {
    background: transparent;
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.25);
  }

  .hai-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    padding: 28px;
  }
  .hai-card--accent {
    border-color: color-mix(in srgb, var(--accent) 45%, transparent);
    box-shadow: 0 0 50px -20px color-mix(in srgb, var(--accent) 60%, transparent);
  }
  .hai-card p { font-size: 14px; line-height: 1.6; color: var(--text-dim); margin: 0; }
  .hai-card p + p { margin-top: 10px; }

  .hai-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .hai-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .hai-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .hai-grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; }
  @media (max-width: 900px) {
    .hai-grid-2, .hai-grid-3, .hai-grid-4 { grid-template-columns: 1fr; }
    .hai-grid-6 { grid-template-columns: repeat(2, 1fr); }
  }

  .hai-stats { display: flex; flex-wrap: wrap; gap: 32px 56px; margin: 24px 0; }
  .hai-stat-num {
    font-weight: 800;
    font-size: clamp(28px, 3vw, 40px);
    color: var(--accent);
    line-height: 1;
    margin-bottom: 6px;
  }
  .hai-stat-label { font-size: 13px; line-height: 1.5; color: var(--text-dim); max-width: 220px; }

  .hai-step {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 20px;
    padding: 22px 0;
    border-top: 1px solid var(--card-border);
  }
  .hai-step:first-of-type { border-top: none; }
  .hai-step-label { font-weight: 700; color: var(--accent); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; padding-top: 4px; }
  .hai-step h4 { font-weight: 700; font-size: 17px; margin: 0 0 6px; }
  .hai-step p, .hai-step ul { font-size: 14px; line-height: 1.6; color: var(--text-dim); margin: 0; }
  .hai-step ul { padding-left: 18px; }

  .hai-ba { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .hai-ba-col h5 {
    font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-dimmer); margin: 0 0 16px;
  }
  .hai-ba-item {
    border-radius: 14px; padding: 16px 18px; font-size: 14px; line-height: 1.5;
    margin-bottom: 12px; border: 1px solid var(--card-border);
  }
  .hai-ba-item--before { background: rgba(255,60,60,0.08); border-color: rgba(255,60,60,0.25); }
  .hai-ba-item--after { background: rgba(90,200,140,0.08); border-color: rgba(90,200,140,0.25); }
  @media (max-width: 900px) { .hai-ba { grid-template-columns: 1fr; } }

  .hai-divider { height: 1px; background: var(--card-border); margin: 56px 0; border: none; }

  .hai-pill {
    display: inline-block; padding: 8px 16px; border-radius: 999px;
    background: rgba(255,255,255,0.06); border: 1px solid var(--card-border);
    font-size: 13px; color: var(--text-dim); margin: 0 8px 8px 0;
  }

  .hai-quote {
    font-family: "Manrope", sans-serif;
    font-weight: 700;
    font-size: clamp(22px, 2.6vw, 30px);
    line-height: 1.3;
    max-width: 820px;
  }

  /* ===== Nav ===== */
  .hai-nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--card-border);
  }
  .hai-nav-inner {
    max-width: 1280px; margin: 0 auto; padding: 16px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .hai-logo { display: flex; flex-direction: column; text-decoration: none; color: var(--text); }
  .hai-logo-mark { font-weight: 800; font-size: 15px; letter-spacing: 0.3em; text-transform: uppercase; }
  .hai-logo-sub { font-size: 10px; color: var(--text-dimmer); letter-spacing: 0.02em; margin-top: 2px; }
  .hai-nav-links { display: flex; align-items: center; gap: 28px; list-style: none; margin: 0; padding: 0; }
  .hai-nav-links a {
    color: var(--text-dim); text-decoration: none; font-size: 13px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase; padding-bottom: 4px;
    border-bottom: 2px solid transparent; transition: color 0.2s ease, border-color 0.2s ease;
  }
  .hai-nav-links a:hover, .hai-nav-links a.is-active { color: var(--text); border-color: var(--accent); }
  @media (max-width: 800px) { .hai-nav-links { display: none; } }

  /* ===== Footer ===== */
  .hai-footer { background: #f4ecdc; color: #0a0a0a; }
  .hai-footer .hai-container { padding-top: 56px; padding-bottom: 40px; }
  .hai-footer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; margin-bottom: 64px; }
  .hai-footer-col-heading {
    font-size: 11px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase;
    color: rgba(0,0,0,0.55); margin-bottom: 18px;
  }
  .hai-footer-links { list-style: none; margin: 0; padding: 0; }
  .hai-footer-links li { margin-bottom: 10px; }
  .hai-footer-links a { color: rgba(0,0,0,0.85); text-decoration: none; font-size: 14px; }
  .hai-footer-links a:hover { text-decoration: underline; }
  .hai-footer-bottom {
    display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
    gap: 20px; padding-top: 28px; border-top: 1px solid rgba(0,0,0,0.15);
    font-size: 11px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(0,0,0,0.55);
  }
  .hai-social { display: flex; gap: 14px; }
  .hai-social a {
    width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.08);
    display: flex; align-items: center; justify-content: center; color: #0a0a0a; text-decoration: none;
  }
  .hai-social a:hover { background: var(--accent); color: #0a0a0a; }
  @media (max-width: 900px) { .hai-footer-grid { grid-template-columns: repeat(2, 1fr); } }

  /* ===== Hero (Home + service pages) ===== */
  .hai-hero {
    position: relative;
    min-height: 92vh;
    display: flex;
    align-items: center;
    overflow: hidden;
    background:
      radial-gradient(60% 55% at 70% 30%, color-mix(in srgb, var(--accent) 30%, transparent), transparent 70%),
      #0a0a0a;
  }
  .hai-hero-grid {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 40px;
    align-items: center;
    width: 100%;
  }
  .hai-hero-stage {
    position: relative;
    aspect-ratio: 1 / 1;
    width: 100%;
  }
  .hai-hero-glow {
    position: absolute;
    inset: -10%;
    border-radius: 50%;
    background: radial-gradient(circle, color-mix(in srgb, var(--accent) 55%, transparent), transparent 70%);
    filter: blur(30px);
    z-index: 0;
  }
  @media (max-width: 900px) {
    .hai-hero-grid { grid-template-columns: 1fr; }
    .hai-hero { min-height: auto; padding: 64px 0; }
  }

  /* Home hero orbit nodes (service pills orbiting the brain) */
  .hai-orbit-wrap { position: relative; width: 100%; aspect-ratio: 1/1; }
  .hai-orbit-node {
    position: absolute;
    display: flex; align-items: center; gap: 8px;
    background: rgba(10,10,10,0.7);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 999px;
    padding: 8px 16px 8px 8px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text);
    text-decoration: none;
    backdrop-filter: blur(6px);
    animation: hai-orbit-spin 26s linear infinite;
    animation-delay: var(--orbit-delay, 0s);
  }
  .hai-orbit-node .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .hai-orbit-node:hover { border-color: var(--node-color, var(--accent)); }
  @keyframes hai-orbit-spin {
    from { transform: rotate(0deg) translateX(var(--orbit-radius, 220px)) rotate(0deg); }
    to   { transform: rotate(360deg) translateX(var(--orbit-radius, 220px)) rotate(-360deg); }
  }
</style>
